<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Journal of Speculative Worldbuilding</title>

<!-- ⭐ Font hiện đại -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  margin: 0;
  background: linear-gradient(135deg, #6a5acd, #7b68ee);
  display: flex;
  justify-content: center;
  padding: 20px;
}

.container {
  background: white;
  width: 100%;
  max-width: 600px;
  padding: 20px;
  border-radius: 20px;
}

textarea, input, button {
  font-family: inherit;
}

textarea {
  resize: vertical;
  min-height: 100px;
  max-height: 300px;
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #ccc;
  font-size: 16px;
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #ccc;
  font-size: 16px;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: #6a5acd;
  color: white;
  font-size: 18px;
  cursor: pointer;
  font-weight: 600;
}

button:hover { background: #5941c9; }

.post {
  background: #f1f1f1;
  padding: 15px;
  border-radius: 12px;
  margin-top: 12px;
}

.name {
  font-weight: 600;
  margin-bottom: 6px;
}

.content {
  white-space: pre-wrap;
  word-wrap: break-word;
}

.deleteBtn {
  margin-top: 8px;
  background: #ff4d4d;
  border: none;
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
}
</style>
</head>
<body>

<div class="container">
  <h2>💬 Write Your Own Story</h2>

  <input id="nicknameInput" placeholder="Nickname (Optional)" />
  <textarea id="statusInput" placeholder="Your idea"></textarea>
  <button onclick="postStatus()">Post</button>

  <div id="posts"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, query, orderBy,
  onSnapshot, serverTimestamp, deleteDoc, doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 Firebase CONFIG của bạn */
const firebaseConfig = {
  apiKey: "AIzaSyC3Yu_mU38Ru7PIEGR-2rNSo5FoelowrUQ",
  authDomain: "tuanhh-f16a9.firebaseapp.com",
  projectId: "tuanhh-f16a9",
  storageBucket: "tuanhh-f16a9.appspot.com",
  messagingSenderId: "71969140903",
  appId: "1:71969140903:web:49986baacfbbd1f9e8ab82"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* Đăng bài */
window.postStatus = async () => {
  const text = statusInput.value.trim();
  let nickname = nicknameInput.value.trim();

  if (!text) return alert("Write something!");
  if (!nickname) nickname = "Anonymous";

  await addDoc(collection(db, "statuses"), {
    text,
    nickname,
    time: serverTimestamp()
  });

  statusInput.value = "";
};

/* Xóa bài */
window.deleteStatus = async (id) => {
  if (confirm("Delete this post?"))
    await deleteDoc(doc(db, "statuses", id));
};

/* Hiển thị realtime */
const q = query(collection(db, "statuses"), orderBy("time", "desc"));

onSnapshot(q, snapshot => {
  posts.innerHTML = "";

  snapshot.forEach(docSnap => {
    const data = docSnap.data();

    const div = document.createElement("div");
    div.className = "post";

    const nameDiv = document.createElement("div");
    nameDiv.className = "name";
    nameDiv.textContent = data.nickname || "Anonymous";

    const contentDiv = document.createElement("div");
    contentDiv.className = "content";
    contentDiv.textContent = data.text;

    const delBtn = document.createElement("button");
    delBtn.className = "deleteBtn";
    delBtn.textContent = "Delete";
    delBtn.onclick = () => deleteStatus(docSnap.id);

    div.appendChild(nameDiv);
    div.appendChild(contentDiv);
    div.appendChild(delBtn);

    posts.appendChild(div);
  });
});
</script>

</body>
</html>
