<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymous Status Board</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#6a5acd,#836fff);
  display:flex;
  justify-content:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:500px;
  background:white;
  padding:20px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

h2{
  margin-top:0;
}

input, textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:14px;
  box-sizing:border-box;
}

textarea{
  resize:none;
  height:90px;
}

button{
  width:100%;
  margin-top:12px;
  padding:12px;
  border:none;
  border-radius:10px;
  font-size:16px;
  background:#6a5acd;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#5a4be0;
}

.post{
  background:#eee;
  padding:12px;
  border-radius:10px;
  margin-top:12px;
}

.name{
  font-weight:bold;
}

.time{
  font-size:12px;
  color:#666;
  margin-top:6px;
}
</style>
</head>
<body>

<div class="container">
  <h2>💬 Anonymous Status Board</h2>

  <input id="nickname" placeholder="Nickname (optional)">
  <textarea id="content" placeholder="Your thoughts..."></textarea>
  <button onclick="addPost()">Post</button>

  <div id="statusList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc,
  query, orderBy, onSnapshot, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC3Yu_mU38Ru7PIEGR-2rNSo5FoelowrUQ",
  authDomain: "tuanhh-f16a9.firebaseapp.com",
  projectId: "tuanhh-f16a9",
  storageBucket: "tuanhh-f16a9.firebasestorage.app",
  messagingSenderId: "71969140903",
  appId: "1:71969140903:web:49986baacfbbd1f9e8ab82"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("statusList");

async function translateText(text){
  try{
    const res = await fetch("https://libretranslate.de/translate",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        q:text,
        source:"auto",
        target:"en",
        format:"text"
      })
    });
    const data = await res.json();
    return data.translatedText;
  }catch{
    return text;
  }
}

window.addPost = async function(){
  const nickname = document.getElementById("nickname").value || "Anonymous";
  const content = document.getElementById("content").value;

  if(!content.trim()) return;

  const translated = await translateText(content);

  await addDoc(collection(db,"posts"),{
    nickname,
    content,
    translated,
    time: serverTimestamp()
  });

  document.getElementById("content").value="";
}

const q = query(collection(db,"posts"), orderBy("time","desc"));

onSnapshot(q, snapshot=>{
  if(!list) return;

  list.innerHTML="";

  snapshot.forEach(doc=>{
    const data = doc.data();
    const time = data.time?.toDate().toLocaleString() || "";

    list.innerHTML += `
      <div class="post">
        <div class="name">${data.nickname}</div>
        <div>${data.content}</div>
        <div style="opacity:.7">${data.translated || ""}</div>
        <div class="time">${time}</div>
      </div>
    `;
  });
});
</script>

</body>
</html>
