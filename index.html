<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Journal of Speculative Worldbuilding</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

/* ===== BACKGROUND IMAGE ===== */
body {
  margin: 0;
  display: flex;
  justify-content: center;
  padding: 20px;
  min-height: 100vh;
  position: relative;
  overflow: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("https://raw.githubusercontent.com/Journal-of-Speculative-Worldbuilding/The-lore/refs/heads/main/business%20card.png") center/cover no-repeat;
  filter: blur(6px) brightness(0.7);
  transform: scale(1.05);
  z-index: -2;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: -1;
}

/* ===== GLASS CONTAINER ===== */
.container {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.25);
  box-shadow: 0 25px 60px rgba(0,0,0,0.35);
  width: 100%;
  max-width: 600px;
  padding: 30px 25px;
  border-radius: 24px;
}

.title {
  text-align: center;
  color: #E0C58F;
  margin-bottom: 18px;
}

/* INPUT */
input, textarea {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.25);
  color: #fff;
  font-size: 16px;
  margin-bottom: 10px;
}

textarea {
  resize: vertical;
  min-height: 100px;
}

input::placeholder,
textarea::placeholder {
  color: rgba(255,255,255,0.7);
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: #3C5070;
  color: #E0C58F;
  font-size: 18px;
  cursor: pointer;
  font-weight: 600;
  margin-bottom: 8px;
}

/* POSTS */
.post {
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  padding: 15px;
  border-radius: 12px;
  margin-top: 12px;
  color: white;
}

.name {
  font-weight: 600;
  margin-bottom: 6px;
}

.moreBtn {
  color: #E0C58F;
  cursor: pointer;
  font-size: 14px;
  margin-right: 12px;
}

.deleteBtn {
  margin-top: 8px;
  background: #3C5070;
  color: #E0C58F;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
}
</style>
</head>
<body>

<div class="container">
  <h2 class="title">💬 Write Your Own Story</h2>

  <input id="nicknameInput" placeholder="Nickname (Optional)" />
  <textarea id="statusInput" placeholder="Your idea"></textarea>

  <button onclick="postStatus()">Post</button>

  <div id="posts"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, query, orderBy,
  onSnapshot, serverTimestamp, deleteDoc, doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyC3Yu_mU38Ru7PIEGR-2rNSo5FoelowrUQ",
  authDomain: "tuanhh-f16a9.firebaseapp.com",
  projectId: "tuanhh-f16a9",
  storageBucket: "tuanhh-f16a9.appspot.com",
  messagingSenderId: "71969140903",
  appId: "1:71969140903:web:49986baacfbbd1f9e8ab82"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ADMIN */
const ADMIN_KEY = "123456";
const params = new URLSearchParams(window.location.search);
const isAdmin = params.get("admin") === ADMIN_KEY;

/* POST */
window.postStatus = async () => {
  const text = statusInput.value.trim();
  let nickname = nicknameInput.value.trim();

  if (!text) return alert("Write something!");
  if (!nickname) nickname = "Anonymous";

  await addDoc(collection(db, "statuses"), {
    text,
    nickname,
    time: serverTimestamp()
  });

  statusInput.value = "";
};

/* DELETE */
window.deleteStatus = async id => {
  if (confirm("Delete this post?"))
    await deleteDoc(doc(db, "statuses", id));
};

/* REALTIME LOAD */
const q = query(collection(db, "statuses"), orderBy("time", "desc"));

onSnapshot(q, snapshot => {
  const container = document.getElementById("posts");
  container.innerHTML = "";

  snapshot.forEach(docSnap => {
    const data = docSnap.data();

    const div = document.createElement("div");
    div.className = "post";

    const name = document.createElement("div");
    name.className = "name";
    name.textContent = data.nickname || "Anonymous";

    const content = document.createElement("div");
    content.textContent = data.text;

    div.appendChild(name);
    div.appendChild(content);

    if (isAdmin) {
      const del = document.createElement("button");
      del.className = "deleteBtn";
      del.textContent = "Delete";
      del.onclick = () => deleteStatus(docSnap.id);
      div.appendChild(del);
    }

    container.appendChild(div);
  });
});
</script>
</body>
</html>
