<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, addDoc,
  onSnapshot, query, orderBy, serverTimestamp, deleteDoc, doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔹 CẤU HÌNH FIREBASE
const firebaseConfig = {
  const firebaseConfig = {
  apiKey: "AIzaSyC3Yu_mU38Ru7PIEGR-2rNSo5FoelowrUQ",
  authDomain: "tuanhh-f16a9.firebaseapp.com",
  projectId: "tuanhh-f16a9",
  storageBucket: "tuanhh-f16a9.firebasestorage.app",
  messagingSenderId: "71969140903",
  appId: "1:71969140903:web:49986baacfbbd1f9e8ab82"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔹 ADMIN PASSWORD
const ADMIN_PASSWORD = "123456"; 
let isAdmin = false;

// 🔹 CACHE BẢN DỊCH (tăng tốc)
const translateCache = {};

// 🔹 ĐĂNG BÀI
window.postStatus = async function(){
  const text = document.getElementById("statusInput").value.trim();
  const nickname = document.getElementById("nicknameInput").value.trim() || "Anonymous";

  if(!text) return alert("Please enter content!");

  await addDoc(collection(db,"statuses"),{
    text,
    nickname,
    time: serverTimestamp()
  });

  document.getElementById("statusInput").value="";
};

// 🔹 XÓA BÀI (ADMIN)
window.deleteStatus = async function(id){
  if(confirm("Delete this post?")){
    await deleteDoc(doc(db,"statuses",id));
  }
};

// 🔹 ĐĂNG NHẬP ADMIN
window.adminLogin = function(){
  const pass = prompt("Enter admin password:");
  if(pass === ADMIN_PASSWORD){
    isAdmin = true;
    alert("Admin mode enabled");
  }
};

// 🔹 DỊCH NHANH (LibreTranslate)
window.translateText = async function(button, originalText){

  const lang = "en";   // 👉 luôn dịch sang tiếng Anh
  const cacheKey = originalText + lang;

  // dùng cache nếu đã dịch
  if(translateCache[cacheKey]){
    button.previousElementSibling.innerText = translateCache[cacheKey];
    button.remove();
    return;
  }

  button.innerText = "Translating...";

  try{
    const res = await fetch("https://translate.argosopentech.com/translate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        q: originalText,
        source: "auto",
        target: lang,
        format: "text"
      })
    });

    const data = await res.json();
    const translated = data.translatedText;

    translateCache[cacheKey] = translated;

    button.previousElementSibling.innerText = translated;
    button.remove();

  }catch(err){
    button.innerText = "Error";
  }
};

// 🔹 HIỂN THỊ BÀI VIẾT
const q = query(collection(db,"statuses"), orderBy("time","desc"));

onSnapshot(q,(snapshot)=>{
  const list = document.getElementById("statusList");
  list.innerHTML="";

  snapshot.forEach(docSnap=>{
    const data = docSnap.data();

    const div = document.createElement("div");
    div.className="status";

    div.innerHTML = `
      <strong>${data.nickname}</strong>
      <p class="statusText">${data.text}</p>

      <button onclick="translateText(this, \`${data.text}\`)">
        🌐 Translate
      </button>

      ${isAdmin ? `<button onclick="deleteStatus('${docSnap.id}')">❌ Delete</button>` : ``}
    `;

    list.appendChild(div);
  });
});
</script>
