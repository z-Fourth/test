<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymous Status Board</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(135deg,#6a5acd,#7b68ee);
  display:flex;
  justify-content:center;
  padding:20px;
}

.container{
  background:white;
  width:100%;
  max-width:600px;
  padding:20px;
  border-radius:20px;
}

input, textarea{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ccc;
  font-size:16px;
  margin-bottom:10px;
}

textarea{ resize:none; height:100px; }

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#6a5acd;
  color:white;
  font-size:18px;
  cursor:pointer;
}

.post{
  background:#f1f1f1;
  padding:15px;
  border-radius:12px;
  margin-top:12px;
}

.name{font-weight:bold;margin-bottom:6px;}
.time{font-size:12px;color:gray;margin-top:6px;}

.deleteBtn{
  margin-top:8px;
  background:#ff4d4d;
  border:none;
  color:white;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
}

.moreBtn,.translateBtn{
  color:#6a5acd;
  cursor:pointer;
  font-size:14px;
  margin-top:6px;
  display:inline-block;
}

.translated{
  margin-top:6px;
  font-style:italic;
}
</style>
</head>
<body>

<div class="container">
  <h2>💬 Anonymous Status Board</h2>

  <input id="nicknameInput" placeholder="Nickname (optional)">
  <textarea id="statusInput" placeholder="What's on your mind?"></textarea>
  <button onclick="postStatus()">Post</button>

  <div id="posts"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
 const firebaseConfig = {
  apiKey: "AIzaSyC3Yu_mU38Ru7PIEGR-2rNSo5FoelowrUQ",
  authDomain: "tuanhh-f16a9.firebaseapp.com",
  projectId: "tuanhh-f16a9",
  storageBucket: "tuanhh-f16a9.firebasestorage.app",
  messagingSenderId: "71969140903",
  appId: "1:71969140903:web:49986baacfbbd1f9e8ab82"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 👑 ADMIN */
const ADMIN_KEY="123456";
const params=new URLSearchParams(window.location.search);
const isAdmin=params.get("admin")===ADMIN_KEY;

/* 🌍 user language */
const userLang=navigator.language.slice(0,2);

/* 🌐 translate */
async function translateText(text,target){
  const res=await fetch("https://libretranslate.de/translate",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({
      q:text,
      source:"auto",
      target:target,
      format:"text"
    })
  });
  const data=await res.json();
  return data.translatedText;
}

/* post status */
window.postStatus=async()=>{
  const text=document.getElementById("statusInput").value.trim();
  let nickname=document.getElementById("nicknameInput").value.trim();

  if(text===""){ alert("Please write something!"); return; }
  if(nickname==="") nickname="Anonymous";

  await addDoc(collection(db,"statuses"),{
    text,
    nickname,
    time:serverTimestamp()
  });

  document.getElementById("statusInput").value="";
}

/* delete post (admin) */
window.deleteStatus=async(id)=>{
  if(confirm("Delete this post?")){
    await deleteDoc(doc(db,"statuses",id));
  }
}

/* realtime display */
const q=query(collection(db,"statuses"),orderBy("time","desc"));

onSnapshot(q,(snapshot)=>{
  const posts=document.getElementById("posts");
  posts.innerHTML="";

  snapshot.forEach(docSnap=>{
    const data=docSnap.data();
    const fullText=data.text;
    const shortText=fullText.substring(0,200);
    const needsToggle=fullText.length>200;

    const div=document.createElement("div");
    div.className="post";

    const time=data.time?.toDate().toLocaleString() ?? "";

    div.innerHTML=`
      <div class="name">${data.nickname}</div>
      <div class="content">${needsToggle?shortText+"...":fullText}</div>
      ${needsToggle?'<span class="moreBtn">Read more</span>':``}
      <div class="translated"></div>
      <span class="translateBtn">🌐 Translate</span>
      <div class="time">${time}</div>
      ${isAdmin?'<button class="deleteBtn">❌ Delete</button>':``}
    `;

    /* read more */
    if(needsToggle){
      const moreBtn=div.querySelector(".moreBtn");
      const content=div.querySelector(".content");
      let expanded=false;
      moreBtn.onclick=()=>{
        expanded=!expanded;
        content.textContent=expanded?fullText:shortText+"...";
        moreBtn.textContent=expanded?"Show less":"Read more";
      }
    }

    /* translate */
    const tBtn=div.querySelector(".translateBtn");
    const tBox=div.querySelector(".translated");

    tBtn.onclick=async()=>{
      tBtn.textContent="Translating...";
      const translated=await translateText(fullText,userLang);
      tBox.textContent=translated;
      tBtn.style.display="none";
    }

    /* delete */
    if(isAdmin){
      div.querySelector(".deleteBtn").onclick=()=>{
        deleteStatus(docSnap.id);
      }
    }

    posts.appendChild(div);
  })
});
</script>

</body>
</html>
