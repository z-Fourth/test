<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bảng trạng thái ẩn danh</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(135deg,#6a5acd,#7b68ee);
  display:flex;
  justify-content:center;
  padding:20px;
}

.container{
  background:white;
  width:100%;
  max-width:600px;
  padding:20px;
  border-radius:20px;
  overflow:hidden;
}

h2{
  margin-top:0;
}

input, textarea{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ccc;
  font-size:16px;
  margin-bottom:10px;
}

textarea{
  resize:none;
  height:100px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#6a5acd;
  color:white;
  font-size:18px;
  cursor:pointer;
}

button:hover{
  background:#5941c9;
}

.post{
  background:#f1f1f1;
  padding:15px;
  border-radius:12px;
  margin-top:12px;
}

.name{
  font-weight:bold;
  margin-bottom:6px;
}

.time{
  font-size:12px;
  color:gray;
  margin-top:6px;
}

.deleteBtn{
  margin-top:8px;
  background:#ff4d4d;
  border:none;
  color:white;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
}

.deleteBtn:hover{
  background:#e60000;
}

.moreBtn{
  color:#6a5acd;
  cursor:pointer;
  font-size:14px;
  margin-top:6px;
  display:inline-block;
}
</style>
</head>
<body>

<div class="container">
  <h2>💬 Bảng trạng thái ẩn danh</h2>

  <input id="nicknameInput" placeholder="Nickname (không bắt buộc)">
  <textarea id="statusInput" placeholder="Ý tưởng của bạn"></textarea>
  <button onclick="postStatus()">Đăng</button>

  <div id="posts"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 DÁN CONFIG FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyC3Yu_mU38Ru7PIEGR-2rNSo5FoelowrUQ",
  authDomain: "tuanhh-f16a9.firebaseapp.com",
  projectId: "tuanhh-f16a9",
  storageBucket: "tuanhh-f16a9.firebasestorage.app",
  messagingSenderId: "71969140903",
  appId: "1:71969140903:web:49986baacfbbd1f9e8ab82"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🔑 ADMIN */
const ADMIN_KEY = "123456"; // đổi mã bí mật
const params = new URLSearchParams(window.location.search);
const isAdmin = params.get("admin") === ADMIN_KEY;

/* 🚀 ĐĂNG STATUS */
window.postStatus = async function(){
  const text = document.getElementById("statusInput").value.trim();
  let nickname = document.getElementById("nicknameInput").value.trim();

  if(text === ""){
    alert("Hãy viết gì đó!");
    return;
  }

  if(nickname === "") nickname = "Ẩn danh";

  await addDoc(collection(db,"statuses"),{
    text,
    nickname,
    time: serverTimestamp()
  });

  document.getElementById("statusInput").value="";
}

/* 🗑 XÓA STATUS */
window.deleteStatus = async function(id){
  if(confirm("Xóa bài viết này?")){
    await deleteDoc(doc(db,"statuses",id));
  }
}

/* 👀 HIỂN THỊ REALTIME */
const q = query(collection(db,"statuses"), orderBy("time","desc"));

onSnapshot(q,(snapshot)=>{
  const posts = document.getElementById("posts");
  posts.innerHTML="";

  snapshot.forEach(docSnap=>{
    const data = docSnap.data();
    const div = document.createElement("div");
    div.className="post";

    const time = data.time?.toDate().toLocaleString() ?? "";

    const fullText = data.text;
    const shortText = fullText.substring(0,200);

    const needsToggle = fullText.length > 200;

    div.innerHTML = `
      <div class="name">${data.nickname ?? "Ẩn danh"}</div>
      <div class="content">${needsToggle ? shortText + "..." : fullText}</div>
      ${needsToggle ? `<span class="moreBtn">Xem thêm</span>` : ``}
      <div class="time">${time}</div>
      ${isAdmin ? `<button class="deleteBtn">❌ Xóa</button>` : ``}
    `;

    /* nút xem thêm */
    if(needsToggle){
      const moreBtn = div.querySelector(".moreBtn");
      const content = div.querySelector(".content");
      let expanded = false;

      moreBtn.onclick = ()=>{
        expanded = !expanded;
        content.textContent = expanded ? fullText : shortText + "...";
        moreBtn.textContent = expanded ? "Thu gọn" : "Xem thêm";
      }
    }

    /* nút xóa */
    if(isAdmin){
      div.querySelector(".deleteBtn").onclick=()=>{
        deleteStatus(docSnap.id);
      }
    }

    posts.appendChild(div);
  })
});
</script>

</body>
</html>
